api:
  enabled: true
  address: "0.0.0.0:8686"

sources:
  vectorlogs:
    type: internal_logs

  docker:
    type: docker_logs
    exclude_containers:
      - vector

  traefik_access_log:
    type: file
    include:
      - /var/log/traefik/access.log
    read_from: beginning

transforms:
  parse_docker_logs:
    type: remap
    inputs:
      - docker
    source: |
      if exists(.container_name) {
        .container = to_string(.container_name) ?? "unknown"
      } else if exists(.label."com.docker.swarm.service.name") {
        .container = to_string(.label."com.docker.swarm.service.name") ?? "unknown"
      } else {
        .container = "unknown"
      }
      .image = to_string(.image) ?? "unknown"

  parse_traefik_access:
    type: remap
    inputs:
      - traefik_access_log
    source: |
      .container = "traefik"
      .log_type = "access"

sinks:
  loki_vectorlogs:
    type: loki
    inputs:
      - vectorlogs
    encoding:
      codec: json
    endpoint: 'http://loki:3100'
    labels:
      logsource: vector

  loki_docker:
    type: loki
    inputs:
      - parse_docker_logs
    encoding:
      codec: json
    endpoint: 'http://loki:3100'
    labels:
      logsource: docker
      container: "{{ container }}"

  loki_traefik_access:
    type: loki
    inputs:
      - parse_traefik_access
    encoding:
      codec: json
    endpoint: 'http://loki:3100'
    labels:
      logsource: traefik
      log_type: access
