api:
  enabled: true
  address: "0.0.0.0:8686"

sources:
  vectorlogs:
    type: internal_logs

  docker:
    type: docker_logs
    exclude_containers:
      - vector

transforms:
  parse_docker_logs:
    type: remap
    inputs:
      - docker
    source: |
      .container = string!(.container_name)
      .image = string!(.container_image)

sinks:
  loki_vectorlogs:
    type: loki
    inputs:
      - vectorlogs
    encoding:
      codec: json
    endpoint: 'http://loki:3100'
    labels:
      logsource: vector
    acknowledgements:
      enabled: true

  loki_docker:
    type: loki
    inputs:
      - parse_docker_logs
    encoding:
      codec: json
    endpoint: 'http://loki:3100'
    labels:
      logsource: docker
      container: "{{ container }}"
      image: "{{ image }}"
    acknowledgements:
      enabled: true
